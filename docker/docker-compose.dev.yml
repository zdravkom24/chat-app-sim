services:
  nginx:
    image: nginx:alpine
    container_name: ${COMPOSE_PROJECT_NAME}-nginx
    ports:
      - "${NGINX_PORT}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - app-net
    restart: unless-stopped

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile.dev
    container_name: ${COMPOSE_PROJECT_NAME}-frontend
    volumes:
      - ../frontend:/app
      - /app/node_modules
    environment:
      NODE_ENV: ${NODE_ENV}
    networks:
      - app-net
    restart: unless-stopped

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile.dev
    container_name: ${COMPOSE_PROJECT_NAME}-backend
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ../backend:/app
      - /app/node_modules
      - sqlite_data:/app/data
    environment:
      NODE_ENV: ${NODE_ENV}
    networks:
      - app-net
    restart: unless-stopped

volumes:
  sqlite_data:

networks:
  app-net:
    driver: bridge
